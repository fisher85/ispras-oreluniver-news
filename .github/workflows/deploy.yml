name: Deploy MkDocs to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs
        run: mkdocs build

      - name: Deploy to oreluniver.fudov.ru
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: site/
          remote_path: /var/www/oreluniver.fudov.ru/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy to oreluniver.ispras.ru
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: site/
          remote_path: /var/www/oreluniver.ispras.ru/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}